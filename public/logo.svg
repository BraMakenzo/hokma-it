<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- Gradient for the right leg of H (blue gradient) -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#1560bd"/>
      <stop offset="100%" stop-color="#1e90ff"/>
    </linearGradient>
    <!-- Gradient for left leg of H (dark to slightly blue) -->
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
  </defs>

  <!-- ===== H LETTER ===== -->
  <!-- Left vertical bar (dark) -->
  <rect x="108" y="40" width="32" height="155" rx="3" fill="url(#darkGrad)"/>

  <!-- Right vertical bar (blue gradient) -->
  <rect x="205" y="40" width="32" height="155" rx="3" fill="url(#blueGrad)"/>

  <!-- Crossbar (dark, centered) -->
  <rect x="108" y="103" width="129" height="28" rx="3" fill="#111111"/>

  <!-- ===== CIRCUIT LINES & DOTS on right side ===== -->
  <!-- Three horizontal lines extending right from right bar -->
  <!-- Top line -->
  <line x1="237" y1="75" x2="282" y2="75" stroke="#1e90ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branch up from end -->
  <line x1="282" y1="75" x2="282" y2="60" stroke="#1e90ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="282" cy="58" r="5" fill="none" stroke="#1e90ff" stroke-width="2.5"/>

  <!-- Middle line -->
  <line x1="237" y1="117" x2="290" y2="117" stroke="#1e90ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="292" cy="117" r="5" fill="none" stroke="#1e90ff" stroke-width="2.5"/>

  <!-- Bottom line -->
  <line x1="237" y1="158" x2="282" y2="158" stroke="#1e90ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branch down from end -->
  <line x1="282" y1="158" x2="282" y2="173" stroke="#1e90ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="282" cy="175" r="5" fill="none" stroke="#1e90ff" stroke-width="2.5"/>

  <!-- ===== TEXT: HOKMA IT ===== -->
  <!-- Main company name -->
  <text
    x="200"
    y="230"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="6"
    fill="#111111"
  >HOKMA IT</text>

  <!-- Divider line -->
  <line x1="148" y1="242" x2="252" y2="242" stroke="#1e90ff" stroke-width="1.5"/>

  <!-- Tagline -->
  <text
    x="200"
    y="262"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#555555"
  >INTELLIGENT IT SOLUTIONS</text>
</svg>
